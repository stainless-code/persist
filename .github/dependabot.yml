version: 2

updates:
  # npm — group devDep bumps so they land in one weekly PR (devDeps only;
  # the package has no runtime deps). Peer deps are intentionally not bumped
  # (their ranges are the public surface).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-deps:
        dependency-type: development

  # GitHub Actions — keep the SHA-pinned actions current. Bumps the commit SHA
  # (and the trailing `# vN` comment) so a pinned action's latest major stays
  # tamper-resistant without manual tracking.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
