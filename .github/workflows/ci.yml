# Version PRs from `changesets/action` use head branch `changeset-release/<base>` (e.g. `changeset-release/main`);
# see changesets/action `run.ts`: `versionBranch = \`changeset-release/${branch}\``.
#
# GitHub docs: required status checks may be successful, skipped, or neutral — skipped often still allows merge
# (see https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-protected-branches/about-protected-branches#require-status-checks-before-merging ).
# This workflow still gates on `changeset-release/*` and finishes with one **`CI complete`** job so there is a
# single unambiguous pass/fail (branch protection also warns that duplicate job *names* across workflows can block merges).
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least privilege: every CI job is read-only (no repo writes). The Release
# workflow carries its own elevated `permissions` (contents / pull-requests /
# id-token) — this default does not extend to it.
permissions:
  contents: read

jobs:
  skip-ci:
    name: Gate (skip full CI for version PRs?)
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
    steps:
      - id: gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             echo "${{ github.head_ref }}" | grep -q '^changeset-release/'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Head is changeset-release/* — full CI skipped; ci-complete will pass."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: 💅 Format
    needs: skip-ci
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run format
        run: bun run format:check

  lint:
    name: 🕵 Lint
    needs: skip-ci
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint
        run: bun run lint:ci

  typecheck:
    name: ✅ Typecheck
    needs: skip-ci
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run typecheck
        run: bun run typecheck

  test:
    name: 🔬 Test
    needs: skip-ci
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests with coverage gate
        run: bun run test:coverage

  test-dom:
    name: 🌐 Test (DOM)
    needs: skip-ci
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run React reactivity tests (vitest + jsdom)
        run: bun run test:dom

  build:
    name: 🧰 Build
    needs: skip-ci
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run build
        run: bun run build

  check-pack:
    name: 📦 Pack validation
    needs: [skip-ci, build]
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run pack validation
        run: bun run check:pack

  size:
    name: 📏 Bundle size
    needs: [skip-ci, build]
    if: needs['skip-ci'].outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run size limit
        run: bun run size

  audit:
    # Non-blocking — known-CVE visibility only; does not catch supply-chain malware.
    # Team policy: if this job is red on a dep/lockfile PR, triage before merge
    # (overrides, fork swaps, or accepted risk with issue) even though CI stays green.
    # Promote to blocking (drop continue-on-error) after main stays clean for a
    # few weeks — Dependabot handles action bumps; dep bumps are intentional via bun update -i.
    name: 🛡 Audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: bun audit
        run: bun audit

  ci-complete:
    name: CI complete
    needs:
      [
        skip-ci,
        format,
        lint,
        typecheck,
        test,
        test-dom,
        build,
        check-pack,
        size,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: |
          needs['skip-ci'].outputs.skip != 'true' && (
            needs.format.result != 'success' ||
            needs.lint.result != 'success' ||
            needs.typecheck.result != 'success' ||
            needs.test.result != 'success' ||
            needs['test-dom'].result != 'success' ||
            needs.build.result != 'success' ||
            needs['check-pack'].result != 'success' ||
            needs.size.result != 'success'
          )
        run: exit 1

      - name: OK
        run: echo "CI requirements satisfied"
