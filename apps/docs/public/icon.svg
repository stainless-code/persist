<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <style>
    .ring { stroke: #18181b; }
    .settled { fill: #b45309; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #fafafa; }
      .settled { fill: #fbbf24; }
    }
  </style>
  <circle
    class="ring"
    cx="12"
    cy="12"
    r="9"
    stroke-width="1.75"
    stroke-dasharray="4 3"
    opacity="0.55"
  />
  <circle class="settled" cx="12" cy="12" r="4.5" />
</svg>
